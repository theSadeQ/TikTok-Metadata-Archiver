name: Scrape TikTok Video IDs

on:
  workflow_dispatch:
    inputs:
      usernames:
        description: "Comma-separated TikTok usernames. Example: user1,user2,@user3,https://www.tiktok.com/@user4"
        required: true
        type: string

concurrency:
  group: tiktok-metadata-scrape
  cancel-in-progress: false

jobs:
  scrape:
    name: Extract TikTok video URLs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies with uv (venv)
        shell: bash
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          uv venv "$HOME/.venv"
          uv pip install --python "$HOME/.venv/bin/python" --upgrade yt-dlp
          echo "$HOME/.venv/bin" >> "$GITHUB_PATH"
          echo "yt-dlp version: $("$HOME/.venv/bin/yt-dlp" --version)"

      - name: Extract video URLs in parallel
        shell: bash
        run: |
          # Tolerant mode: log errors but don't abort on first failure
          set +e
          set +u
          set -o pipefail

          RAW_INPUT="${{ inputs.usernames }}"
          OUTPUT_DIR="outputs"
          TMP_DIR="$(mktemp -d)"
          DEBUG_LOG="$TMP_DIR/debug.log"

          mkdir -p "$OUTPUT_DIR"
          touch "$DEBUG_LOG"

          log() {
            echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] $*" | tee -a "$DEBUG_LOG"
          }

          log "Starting scrape"
          log "Raw input: $RAW_INPUT"
          log "yt-dlp: $(yt-dlp --version 2>&1)"

          IFS=',' read -ra USER_LIST <<< "$RAW_INPUT"
          log "Total users to process: ${#USER_LIST[@]}"

          declare -A INDEX_TO_USER
          PIDS=()
          INDEX=0

          for RAW_USER in "${USER_LIST[@]}"; do
            USERNAME="$(printf '%s' "$RAW_USER" \
              | sed -E 's#https?://(www\.)?tiktok\.com/@##' \
              | sed -E 's#/.*$##' \
              | sed 's#^@##' \
              | sed 's#/$##' \
              | xargs)"

            if [ -z "$USERNAME" ]; then
              log "Skipping empty entry: '$RAW_USER'"
              INDEX=$((INDEX + 1))
              continue
            fi

            INDEX_TO_USER["$INDEX"]="$USERNAME"
            PROFILE_URL="https://www.tiktok.com/@$USERNAME"
            TEMP_IDS_FILE="$TMP_DIR/ids_$INDEX.txt"
            JOB_LOG="$TMP_DIR/job_${INDEX}.log"

            log "Launching scrape #$INDEX: $USERNAME ($PROFILE_URL)"

            (
              echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] Starting yt-dlp for $USERNAME" >> "$JOB_LOG"

              yt-dlp \
                --flat-playlist \
                --print id \
                --verbose \
                "$PROFILE_URL" \
                > "$TEMP_IDS_FILE" \
                2>> "$JOB_LOG"

              EXIT_CODE=$?
              echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] yt-dlp exit code: $EXIT_CODE" >> "$JOB_LOG"

              if [ $EXIT_CODE -ne 0 ]; then
                echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] FAILED: $USERNAME" >> "$JOB_LOG"
                rm -f "$TEMP_IDS_FILE"
                touch "$TEMP_IDS_FILE.failed"
              else
                LINE_COUNT=$(wc -l < "$TEMP_IDS_FILE" 2>/dev/null || echo 0)
                echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] OK: $USERNAME — $LINE_COUNT IDs" >> "$JOB_LOG"
              fi
            ) &

            PIDS+=($!)
            INDEX=$((INDEX + 1))
          done

          log "Waiting for all ${#PIDS[@]} job(s)..."
          for pid in "${PIDS[@]}"; do
            wait "$pid"
          done
          log "All scrapes finished."

          # Dump all per-job logs into main output
          echo ""
          echo "===== PER-JOB LOGS ====="
          for logfile in "$TMP_DIR"/job_*.log; do
            [ -f "$logfile" ] || continue
            echo "--- $(basename "$logfile") ---"
            cat "$logfile"
            echo ""
          done
          echo "========================"

          SUCCESS_COUNT=0
          FAIL_COUNT=0

          for i in "${!INDEX_TO_USER[@]}"; do
            USERNAME="${INDEX_TO_USER[$i]}"
            TEMP_IDS_FILE="$TMP_DIR/ids_$i.txt"
            OUTPUT_FILE="$OUTPUT_DIR/${USERNAME}_video_urls.txt"

            log "Processing result #$i: $USERNAME"

            if [ -f "$TEMP_IDS_FILE.failed" ] || [ ! -f "$TEMP_IDS_FILE" ]; then
              log "ERROR: failed or missing output for $USERNAME"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi

            if [ ! -s "$TEMP_IDS_FILE" ]; then
              log "WARNING: empty result for $USERNAME (0 IDs found)"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi

            sed "s#^#https://www.tiktok.com/@$USERNAME/video/#" "$TEMP_IDS_FILE" > "$OUTPUT_FILE"
            COUNT="$(wc -l < "$OUTPUT_FILE" | tr -d '[:space:]')"
            log "Saved $COUNT video URLs -> $OUTPUT_FILE"
            SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          done

          log "Summary: $SUCCESS_COUNT succeeded, $FAIL_COUNT failed"

          if [ "$SUCCESS_COUNT" -eq 0 ]; then
            log "FATAL: no users processed successfully."
            exit 1
          fi

      - name: Commit and push output files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          shopt -s nullglob
          FILES=(outputs/*.txt)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No output files found to commit."
            exit 0
          fi

          git add outputs/*.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add TikTok video URLs for multiple users [skip ci]"
          git push

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-video-urls
          path: outputs/*.txt
          retention-days: 7
