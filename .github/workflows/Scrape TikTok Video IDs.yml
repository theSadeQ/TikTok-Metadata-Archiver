name: Scrape TikTok Video IDs

on:
  workflow_dispatch:
    inputs:
      usernames:
        description: "Comma-separated TikTok usernames. Example: user1,user2,@user3,https://www.tiktok.com/@user4"
        required: true
        type: string

concurrency:
  group: tiktok-metadata-scrape
  cancel-in-progress: false

jobs:
  scrape:
    name: Extract TikTok video URLs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies with uv
        shell: bash
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          uv pip install --system --upgrade yt-dlp
          echo "yt-dlp version: $(yt-dlp --version)"

      - name: Extract video URLs in parallel
        shell: bash
        run: |
          set -euo pipefail

          RAW_INPUT="${{ inputs.usernames }}"
          OUTPUT_DIR="outputs"
          TMP_DIR="$(mktemp -d)"

          mkdir -p "$OUTPUT_DIR"

          IFS=',' read -ra USER_LIST <<< "$RAW_INPUT"

          # -------------------------------------------------------
          # PHASE 1 — launch all yt-dlp scrapes in parallel
          # Each user writes to its own temp file inside TMP_DIR.
          # -------------------------------------------------------
          declare -A INDEX_TO_USER
          PIDS=()
          INDEX=0

          for RAW_USER in "${USER_LIST[@]}"; do
            USERNAME="$(printf '%s' "$RAW_USER" \
              | sed -E 's#https?://(www\.)?tiktok\.com/@##' \
              | sed -E 's#/.*$##' \
              | sed 's#^@##' \
              | sed 's#/$##' \
              | xargs)"

            if [ -z "$USERNAME" ]; then
              echo "Skipping empty username entry: '$RAW_USER'"
              INDEX=$((INDEX + 1))
              continue
            fi

            INDEX_TO_USER["$INDEX"]="$USERNAME"

            PROFILE_URL="https://www.tiktok.com/@$USERNAME"
            TEMP_IDS_FILE="$TMP_DIR/ids_$INDEX.txt"

            echo "Launching scrape #$INDEX: $USERNAME"

            (
              if yt-dlp --flat-playlist --print id "$PROFILE_URL" > "$TEMP_IDS_FILE" 2>&1; then
                echo "[OK] $USERNAME"
              else
                # Write empty file so phase 2 can detect failure
                echo "[FAIL] $USERNAME" >&2
                rm -f "$TEMP_IDS_FILE"
                touch "$TEMP_IDS_FILE.failed"
              fi
            ) &

            PIDS+=($!)
            INDEX=$((INDEX + 1))
          done

          echo "Waiting for all ${#PIDS[@]} scrape job(s) to finish..."
          for pid in "${PIDS[@]}"; do
            wait "$pid"
          done
          echo "All scrapes finished."

          # -------------------------------------------------------
          # PHASE 2 — serial result collection and file writing
          # -------------------------------------------------------
          SUCCESS_COUNT=0
          FAIL_COUNT=0

          for i in "${!INDEX_TO_USER[@]}"; do
            USERNAME="${INDEX_TO_USER[$i]}"
            TEMP_IDS_FILE="$TMP_DIR/ids_$i.txt"
            OUTPUT_FILE="$OUTPUT_DIR/${USERNAME}_video_urls.txt"

            echo "----------------------------------------"
            echo "Processing result #$i: $USERNAME"

            if [ -f "$TEMP_IDS_FILE.failed" ] || [ ! -f "$TEMP_IDS_FILE" ]; then
              echo "Error: failed to extract video IDs for '$USERNAME'"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi

            if [ ! -s "$TEMP_IDS_FILE" ]; then
              echo "Warning: no video IDs found for '$USERNAME'"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi

            sed "s#^#https://www.tiktok.com/@$USERNAME/video/#" "$TEMP_IDS_FILE" > "$OUTPUT_FILE"

            COUNT="$(wc -l < "$OUTPUT_FILE" | tr -d '[:space:]')"
            echo "Saved $COUNT video URLs to $OUTPUT_FILE"

            SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          done

          echo "----------------------------------------"
          echo "Finished processing."
          echo "Successful users: $SUCCESS_COUNT"
          echo "Failed/skipped users: $FAIL_COUNT"

          if [ "$SUCCESS_COUNT" -eq 0 ]; then
            echo "Error: no users were processed successfully."
            exit 1
          fi

      - name: Commit and push output files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          shopt -s nullglob
          FILES=(outputs/*.txt)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No output files found to commit."
            exit 0
          fi

          git add outputs/*.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add TikTok video URLs for multiple users [skip ci]"
          git push

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-video-urls
          path: outputs/*.txt
          retention-days: 7
