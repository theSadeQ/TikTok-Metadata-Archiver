name: TikTok Profile Picture Archiver

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  collect-profile-pictures:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Handle Cookies (Optional)
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          if [ -n "$TIKTOK_COOKIES" ]; then
            printf "%s" "$TIKTOK_COOKIES" > cookies.txt
            echo "cookies.txt created from secret."
          else
            echo "No TIKTOK_COOKIES secret provided. Running anonymously."
          fi

      - name: Prepare output directories
        run: |
          mkdir -p data/profile_pictures

      - name: Run TikTok Profile Picture Downloader
        run: |
          python scripts/download_tiktok_profile_pictures.py \
            --input config/users.txt \
            --output-dir data/profile_pictures \
            --cookies cookies.txt

      - name: Clean up sensitive files
        run: rm -f cookies.txt

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! find data/ -type f | grep -q .; then
            echo "No data files produced. Exiting."
            exit 0
          fi

          git add data/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update TikTok profile pictures [skip ci]"
            git push
          fi
